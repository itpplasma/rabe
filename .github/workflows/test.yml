name: test

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      libneo_ref:
        description: libneo branch, tag or commit to build against
        default: ''

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran cmake make libnetcdf-dev libnetcdff-dev pkg-config

    - name: Build project
      run: |
        if [ -n "${{ inputs.libneo_ref }}" ]; then
          make LIBNEO_REF=${{ inputs.libneo_ref }}
        else
          make
        fi

    - name: Run tests
      run: make test_all
