name: test

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      libneo_ref:
        description: libneo branch, tag or commit to build against
        default: ''

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v31.10.6
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: Build project
      run: |
        if [ -n "${{ inputs.libneo_ref }}" ]; then
          nix develop .#default --command make LIBNEO_REF=${{ inputs.libneo_ref }}
        else
          nix develop .#default --command make
        fi

    - name: Run tests
      run: nix develop .#default --command make test_all
