name: test

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      libneo_ref:
        description: libneo branch, tag or commit to build against
        default: ''

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v31.10.6
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: Build project
      run: |
        if [ -n "${{ inputs.libneo_ref }}" ]; then
          nix develop .#default --command make LIBNEO_REF=${{ inputs.libneo_ref }}
        else
          nix develop .#default --command make
        fi

    - name: Run tests
      run: nix develop .#default --command make test_all

    - name: Build Python bindings and run examples
      run: |
        nix develop .#default --command bash -c '
          set -e
          python3 -m venv .venv-ci
          . .venv-ci/bin/activate
          pip install --quiet numpy "f90wrap>=0.3.0" matplotlib
          cmake -S . -B build-python -DCMAKE_BUILD_TYPE=Release -DBUILD_PYTHON_BINDINGS=ON
          cmake --build build-python
          cmake --install build-python --prefix "$PWD/install-python"
          export PYTHONPATH="$PWD/install-python:$PYTHONPATH"
          export MPLBACKEND=Agg
          python python/example_fourier.py
          python python/example.py
        '
