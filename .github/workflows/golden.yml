name: Golden Record

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      libneo_ref:
        description: libneo branch, tag or commit to build against
        default: ''

jobs:
  golden:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran cmake make libnetcdf-dev libnetcdff-dev pkg-config
        pip install numpy

    - name: Build project
      run: |
        if [ -n "${{ inputs.libneo_ref }}" ]; then
          make LIBNEO_REF=${{ inputs.libneo_ref }}
        else
          make
        fi

    - name: Install Python dependencies
      run: pip install xarray numpy netCDF4

    - name: Run golden record test
      run: make golden
