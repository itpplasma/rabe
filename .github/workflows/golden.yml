name: Golden Record

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran cmake make libnetcdf-dev libnetcdff-dev pkg-config
        pip install numpy

    - name: Build project
      run: make

    - name: Install Python dependencies
      run: pip install xarray numpy netCDF4

    - name: Run golden record test
      run: make golden
