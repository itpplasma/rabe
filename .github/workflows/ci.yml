name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran cmake make libblas-dev liblapack-dev libsuitesparse-dev libnetcdf-dev libnetcdff-dev pkg-config
        pip install numpy

    - name: Build project
      run: make

    - name: Run tests
      run: make test_all

    - name: Install Python dependencies
      run: pip install xarray numpy netCDF4

    - name: Run golden record test
      run: make golden
