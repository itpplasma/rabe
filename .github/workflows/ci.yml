name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gfortran \
          cmake \
          libsuitesparse-dev \
          liblapack-dev \
          libblas-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install \
          gcc \
          cmake \
          suite-sparse \
          openblas \
          lapack

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib scipy pytest pyyaml
        if [ -f python/pyproject.toml ]; then
          pip install -e python/
        fi

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_Fortran_COMPILER=gfortran

    - name: Build
      run: cmake --build build --parallel

    - name: Run quick tests
      run: |
        cd build
        ctest --output-on-failure -L quick

    - name: Run Python tests
      run: |
        if [ -d python/test ]; then
          cd python
          python -m pytest test/ -v
        fi

  test-slow:
    name: Slow tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gfortran \
          cmake \
          libsuitesparse-dev \
          liblapack-dev \
          libblas-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib scipy pytest pyyaml
        if [ -f python/pyproject.toml ]; then
          pip install -e python/
        fi

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_Fortran_COMPILER=gfortran

    - name: Build
      run: cmake --build build --parallel

    - name: Run slow tests
      run: |
        cd build
        ctest --output-on-failure -L slow