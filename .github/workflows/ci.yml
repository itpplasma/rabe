name: CI

on:
  push:
    branches: [ main, feat/ci-pipeline ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gfortran cmake make libblas-dev liblapack-dev libsuitesparse-dev libmpfr-dev

    - name: Build project
      run: make

    - name: Run tests
      run: make test