name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }} - ${{ matrix.build-type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Cache system dependencies (macOS)
      if: runner.os == 'macOS'
      uses: actions/cache@v4
      with:
        path: |
          /usr/local/Cellar
          /usr/local/opt
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/ci.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gfortran \
          cmake \
          libsuitesparse-dev \
          liblapack-dev \
          libblas-dev

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install \
          gcc \
          cmake \
          suite-sparse \
          openblas \
          lapack || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ -f python/pyproject.toml ]; then
          pip install -e python/
        fi

    - name: Build
      run: make CONFIG=${{ matrix.build-type }}

    - name: Run quick tests
      # Run tests labeled 'quick', exclude plot/per_hand/external
      run: make test
      timeout-minutes: 10

    - name: Run Python tests
      if: matrix.build-type == 'Release'
      run: |
        if [ -d python/test ]; then
          cd python
          python -m pytest test/ -v --tb=short
        fi
      timeout-minutes: 5

  test-slow:
    name: Slow tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gfortran \
          cmake \
          libsuitesparse-dev \
          liblapack-dev \
          libblas-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ -f python/pyproject.toml ]; then
          pip install -e python/
        fi

    - name: Build
      run: make CONFIG=Release

    - name: Run slow tests
      # Run tests labeled 'slow', exclude plot/per_hand/external
      run: make test_slow